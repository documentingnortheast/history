<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documenting North East History</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #111;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      background: #222;
    }

    .tab {
      padding: 12px 16px;
      cursor: pointer;
      color: white;
      border-right: 1px solid #333;
    }

    .tab:hover {
      background: #333;
    }

    .tab.active {
      background: #fff;
      color: #111;
      font-weight: bold;
    }

    .content {
      padding: 20px;
      background: white;
      min-height: 300px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    Documenting North East History
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('wbwb')">West Boldon Wild Boys</div>
  </div>

  <div class="content">
    <div id="wbwb">
      <h2>West Boldon Wild Boys</h2>
      <p>
        Write your notes here about the West Boldon Wild Boys. This section is for historical documentation, events, and analysis.
      </p>
    </div>
  </div>

  <script>
    function showTab(id) {
      const sections = document.querySelectorAll('.content > div');
      sections.forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');

      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>

</body>
</html>
